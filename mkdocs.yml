site_name: AIデータセットマーケットプレイス 仕様書
site_description: AI開発者、研究者、企業向けのデータセット販売・購入プラットフォームの仕様書
site_author: Your Name
site_url: https://yourusername.github.io/ai-dataset-marketplace

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html

nav:
  - ホーム: README.md
  - 仕様書: SPECIFICATION.md
  - 技術仕様書: TECHNICAL_SPEC.md
  - AIデータ拡張機能: AI_AUGMENTATION_SPEC.md
  - 無料運営ガイド: FREE_HOSTING_GUIDE.md
  - 価格設定・手数料: PRICING_AND_COMMISSION.md
  - 使用シナリオ: USAGE_SCENARIOS.md
  - 公開ガイド: docs-publish-guide.md

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/ai-dataset-marketplace

